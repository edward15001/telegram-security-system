# Docker Compose - Archivo maestro que une todos los servicios
version: '3.8'

services:
  # Suricata IDS - Análisis de tráfico de red
  suricata:
    build: ./suricata
    container_name: suricata
    network_mode: host
    cap_add:
      - NET_ADMIN
      - SYS_NICE
    volumes:
      - ./logs:/var/log/suricata
    restart: unless-stopped
    mem_limit: 2g
    cpus: 2.0

  # MongoDB - Base de datos para almacenar amenazas detectadas
  mongodb:
    image: mongo:7.0
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    environment:
      - MONGO_INITDB_DATABASE=ciberseguridad
    restart: unless-stopped
    mem_limit: 1g
    cpus: 1.0
    networks:
      - ciberseg_network

  # Ollama - Motor de IA local para análisis de mensajes
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    mem_limit: 8g
    cpus: 4.0
    networks:
      - ciberseg_network
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [ gpu ]
    # Si no tienes GPU, comenta la sección de deploy

    # Bot de Python - Análisis de mensajes de Telegram con IA
  bot_python:
    build: ./bot_python
    container_name: bot_python
    depends_on:
      - suricata
      - mongodb
      - ollama
    volumes:
      - ./logs:/app/logs:ro
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - MONGO_URI=mongodb://mongodb:27017/ciberseguridad
      - OLLAMA_HOST=http://ollama:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-mistral:7b-instruct}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - THREAT_THRESHOLD=${THREAT_THRESHOLD:-70}
    restart: unless-stopped
    mem_limit: 2g
    cpus: 2.0
    networks:
      - ciberseg_network

networks:
  ciberseg_network:
    driver: bridge

volumes:
  logs:
  mongodb_data:
  mongodb_config:
  ollama_data:
