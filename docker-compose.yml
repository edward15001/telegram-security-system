# Docker Compose - Archivo maestro que une todos los servicios

services:
  # Suricata IDS - Análisis de tráfico de red
  suricata:
    build: ./suricata
    container_name: suricata
    network_mode: host
    cap_add:
      - NET_ADMIN
      - SYS_NICE
    volumes:
      - ./logs:/var/log/suricata
    restart: unless-stopped
    mem_limit: 2g
    cpus: 2.0
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  # MongoDB - Base de datos para almacenar amenazas detectadas
  mongodb:
    image: mongo:7.0
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    environment:
      - MONGO_INITDB_DATABASE=ciberseguridad
    restart: unless-stopped
    mem_limit: 1g
    cpus: 1.0
    healthcheck:
      test: [ "CMD", "mongosh", "--eval", "db.adminCommand('ping')" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - ciberseg_network

  # Ollama - Motor de IA local para análisis de mensajes
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_NUM_PARALLEL=1      # Una inferencia a la vez
      - OLLAMA_MAX_LOADED_MODELS=1 # Solo un modelo en memoria
    restart: unless-stopped
    mem_limit: 8g
    cpus: 2.0                      # Deja 2 núcleos libres para el sistema
    networks:
      - ciberseg_network
    healthcheck:
      test: [ "CMD", "ollama", "list" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    # deploy:                    # Descomentar solo si tienes GPU NVIDIA
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [ gpu ]

    # Bot de Python - Análisis de mensajes de Telegram con IA
  bot_python:
    build: ./bot_python
    container_name: bot_python
    depends_on:
      suricata:
        condition: service_started
      mongodb:
        condition: service_healthy
      ollama:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-0}
      - MONGO_URI=mongodb://mongodb:27017/ciberseguridad
      - OLLAMA_HOST=http://ollama:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-mistral:7b-instruct}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - THREAT_THRESHOLD=${THREAT_THRESHOLD:-70}
    restart: unless-stopped
    mem_limit: 2g
    cpus: 2.0
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"
    networks:
      - ciberseg_network

networks:
  ciberseg_network:
    driver: bridge

volumes:
  logs:
  mongodb_data:
  mongodb_config:
  ollama_data:
